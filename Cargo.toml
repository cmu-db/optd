[workspace]
resolver = "2"
members = [
    "cli",
    "connectors/datafusion",
    "optd/core",
    "optd/repository",
    "optd/repository/api",
    "optd/repository/entity",
    "optd/repository/migration",
    "synopses",
    "tests/sqllogictest",
    "tests/sqlplannertest",
]

default-members = [
    "optd/core",
    "optd/repository",
    "optd/repository/api",
    "optd/repository/entity",
    "optd/repository/migration",
    "connectors/datafusion",
    "synopses",
    "tests/sqllogictest",
    "tests/sqlplannertest",
]

[workspace.dependencies]

tokio = { version = "1.47", features = ["macros", "rt", "sync"] }
tracing = "0.1"

# DataFusion dependencies
datafusion = { version = "52.0.0", default-features = false, features = [
    "parquet",
    "sql",
    "unicode_expressions",
    "datetime_expressions",
] }

arrow = { version = "57.2.0", default-features = false }
arrow-schema = { version = "57.2.0", default-features = false }
chrono = { version = "0.4.43", default-features = false }
snafu = "0.8.6"
async-trait = "0.1"
anyhow = "1.0"
itertools = "0.14.0"

sea-orm = { version = "2.0.0-rc", features = [
    "sqlx-postgres",
    "sqlx-sqlite",
    "runtime-tokio-native-tls",
    "macros",
    "mock",
    "entity-registry",
    "schema-sync",
] }
sea-orm-migration = { version = "2.0.0-rc", features = [
    "runtime-tokio-native-tls",
    "sqlx-postgres",
    "sqlx-sqlite",
] }
dotenvy = "0.15.7"
uuid = { version = "1", features = ["v4"] }

[workspace.package]
version = "0.1.0"
edition = "2024"
repository = "https://github.com/cmu-db/optd"
