[workspace]
resolver = "2"
members = [
    "cli",
    "connectors/datafusion",
    "optd/core",
    "synopses",
    "tests/sqllogictest",
    "tests/sqlplannertest",
]

default-members = [
    "optd/core",
    "connectors/datafusion",
    "synopses",
    "tests/sqllogictest",
    "tests/sqlplannertest",
]

[workspace.dependencies]

tokio = { version = "1.47", features = ["macros", "rt", "sync"] }
tracing = "0.1"

# DataFusion dependencies
datafusion = { version = "52.0.0", default-features = false, features = [
    "parquet",
    "sql",
] }

arrow-schema = { version = "58.1.0", default-features = false }
chrono = { version = "0.4.43", default-features = false }
snafu = "0.8.6"
async-trait = "0.1"
anyhow = "1.0"
itertools = "0.14.0"

[workspace.package]
version = "0.1.0"
edition = "2024"
repository = "https://github.com/cmu-db/optd"
