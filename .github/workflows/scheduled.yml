permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize, reopened]
  schedule:
    - cron: '7 7 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

name: scheduled

env:
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  CARGO_TERM_COLOR: always
  TPCH_HF_REVISION: 3d3bbd2ad937afea3add733e7e179faaf085425f
  JOB_HF_REVISION: 51a5d2387a6a63ebbf80fde95d2db597edf345e5

jobs:
  nightly:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    name: ubuntu / nightly / workspace
    steps:
      - uses: actions/checkout@v4
      - name: Install nightly
        uses: dtolnay/rust-toolchain@nightly
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - uses: Swatinem/rust-cache@v2
      - name: Cache TPC-H data
        id: cache-tpch
        uses: actions/cache@v4
        with:
          path: optd/connectors/datafusion/data/tpch/sf-0.1
          key: ${{ runner.os }}-hf-tpch-sf-0.1-${{ env.TPCH_HF_REVISION }}
      - name: Download TPC-H data
        if: steps.cache-tpch.outputs.cache-hit != 'true'
        run: bash ./scripts/download_tpch_hf.sh
      - name: cargo nextest
        run: cargo nextest run --workspace --locked -E 'not binary(slt)'

  updated:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    name: ubuntu / beta / updated
    steps:
      - uses: actions/checkout@v4
      - name: Install beta
        uses: dtolnay/rust-toolchain@beta
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - name: cargo update
        run: cargo update
      - uses: Swatinem/rust-cache@v2
      - name: Cache TPC-H data
        id: cache-tpch
        uses: actions/cache@v4
        with:
          path: optd/connectors/datafusion/data/tpch/sf-0.1
          key: ${{ runner.os }}-hf-tpch-sf-0.1-${{ env.TPCH_HF_REVISION }}
      - name: Download TPC-H data
        if: steps.cache-tpch.outputs.cache-hit != 'true'
        run: bash ./scripts/download_tpch_hf.sh
      - name: cargo nextest
        run: cargo nextest run --workspace --locked -E 'not binary(slt)'
        env:
          RUSTFLAGS: -D deprecated

  full-slt:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'ci:full-slt')
    runs-on: ubuntu-latest
    name: ubuntu / rust-toolchain / slt / full
    steps:
      - uses: actions/checkout@v4
      - name: Read Rust toolchain
        id: rust-toolchain
        run: echo "toolchain=$(rustup show active-toolchain | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.toolchain }}
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - uses: Swatinem/rust-cache@v2
      - name: Cache TPC-H data
        id: cache-tpch
        uses: actions/cache@v4
        with:
          path: optd/connectors/datafusion/data/tpch/sf-0.1
          key: ${{ runner.os }}-hf-tpch-sf-0.1-${{ env.TPCH_HF_REVISION }}
      - name: Download TPC-H data
        if: steps.cache-tpch.outputs.cache-hit != 'true'
        run: bash ./scripts/download_tpch_hf.sh
      - name: Cache JOB Parquet data
        id: cache-job
        uses: actions/cache@v4
        with:
          path: optd/connectors/datafusion/data/job
          key: ${{ runner.os }}-hf-job-${{ env.JOB_HF_REVISION }}
      - name: Download JOB data
        if: steps.cache-job.outputs.cache-hit != 'true'
        run: bash ./scripts/download_job_hf.sh
      - name: cargo nextest full SLT
        run: cargo nextest run --release -p optd-datafusion --test slt --locked
