- sql: |
    create table numbers(id int, grp int, val int, bonus int, note varchar);
    create table dim(id int, category varchar, enabled int);
    insert into numbers values
      (1, 1, 10, 0, 'Alpha'),
      (2, 1, 20, 5, 'alphabet'),
      (3, 2, 15, 5, 'Beta'),
      (4, 2, 30, 10, 'gamma'),
      (5, 3, 8, 0, 'delta');
    insert into dim values
      (1, 'odd', 1),
      (2, 'even', 1),
      (3, 'odd', 0),
      (4, 'even', 1),
      (6, 'missing', 1);
    set optd.optd_strict_mode = true;
    set optd.optd_only = true;
  desc: Setup aggregate feature tables.
  tasks:
    - execute
- sql: |
    select count(id), sum(val), min(val), max(val)
    from numbers;
  desc: Global aggregates without grouping keys.
  tasks:
    - explain
    - execute
- sql: |
    select grp, count(id), sum(val + bonus)
    from numbers
    group by grp
    order by grp;
  desc: Grouped aggregates with expression arguments.
  tasks:
    - explain
    - execute
- sql: |
    select grp, bonus, count(id)
    from numbers
    group by grp, bonus
    order by grp, bonus;
  desc: Aggregates with multiple grouping keys.
  tasks:
    - explain
    - execute
- sql: |
    select d.category, count(n.id), sum(n.val)
    from numbers n
    join dim d on n.id = d.id
    group by d.category
    order by d.category;
  desc: Aggregates over join outputs.
  tasks:
    - explain
    - execute
- sql: |
    select grp, sum(val) as total
    from numbers
    group by grp
    having sum(val) > 20
    order by grp;
  desc: HAVING filters on aggregate outputs.
  tasks:
    - explain
    - execute
- sql: |
    select grp, sum(val) as total
    from numbers
    group by grp
    order by total desc
    limit 2;
  desc: Ordered top-N aggregate results.
  tasks:
    - explain
    - execute
